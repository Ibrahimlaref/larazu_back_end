services:
  - type: web
    name: lazuli-backend
    runtime: docker
    buildCommand: "echo 'Docker build handled by Render'"
    dockerfilePath: ./shop_backend/Dockerfile.prod
    dockerContext: .
    postBuildCommand: "chmod +x shop_backend/post-deploy.sh && ./shop_backend/post-deploy.sh"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: brahim.settings.prod
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: LAZULI_ADMIN_TOKEN
        generateValue: true
      - key: ALLOWED_HOSTS
        fromService:
          type: web
          name: lazuli-backend
          property: host
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-domain.onrender.com
    databases:
      - name: lazuli-db
        databaseName: lazuli
        user: lazuli
    redis:
      - name: lazuli-redis
        url: redis://redis:6379

  - type: redis
    name: lazuli-redis
    ipAllowList: []  # Only accessible by other services in this project

  - type: web
    name: lazuli-frontend
    runtime: static
    buildCommand: "cd shop_frontend && npm install && npm run build"
    staticPublishPath: ./shop_frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: lazuli-backend
          property: host
