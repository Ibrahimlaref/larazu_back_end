services:
  - type: web
    name: lazuli-backend
    runtime: docker
    buildCommand: "echo 'Docker build handled by Render'"
    dockerfilePath: ./Dockerfile.prod
    dockerContext: .
    postBuildCommand: "chmod +x post-deploy.sh && ./post-deploy.sh"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: brahim.settings.prod
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: LAZULI_ADMIN_TOKEN
        generateValue: true
      - key: ALLOWED_HOSTS
        fromService:
          type: web
          name: lazuli-backend
          property: host
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-domain.onrender.com
    databases:
      - name: lazuli-db
        databaseName: lazuli
        user: lazuli
    redis:
      - name: lazuli-redis
        url: redis://redis:6379