services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lazuli
      POSTGRES_USER: lazuli
      POSTGRES_PASSWORD: lazuli
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lazuli -d lazuli"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./shop_backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - ./shop_backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: lazuli
      POSTGRES_USER: lazuli
      POSTGRES_PASSWORD: lazuli
      DJANGO_SETTINGS_MODULE: brahim.settings.dev
      DEBUG: "1"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    volumes:
      - ./shop_backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/admin/login/')"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_lazuli &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./shop_frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_USE_API: "true"
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./shop_frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev -- --host

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build:
      context: ./shop_backend
      dockerfile: Dockerfile.dev
    command: celery -A brahim worker -l info
    volumes:
      - ./shop_backend:/app
      - backend_media:/app/media
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: lazuli
      POSTGRES_USER: lazuli
      POSTGRES_PASSWORD: lazuli
      DJANGO_SETTINGS_MODULE: brahim.settings.dev
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
      - db

  celery-beat:
    build:
      context: ./shop_backend
      dockerfile: Dockerfile.dev
    command: celery -A brahim beat -l info
    volumes:
      - ./shop_backend:/app
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: lazuli
      POSTGRES_USER: lazuli
      POSTGRES_PASSWORD: lazuli
      DJANGO_SETTINGS_MODULE: brahim.settings.dev
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
  backend_static:
  backend_media:
